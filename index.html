<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff4fa3">
<title>Happy Birthday 🎉</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ff9ecf,#ffc3e6,#c8b6ff);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow-x:hidden;
  color:white;
  text-align:center;
}

.container{
  width:95%;
  max-width:520px;
  background:rgba(0,0,0,.25);
  padding:25px;
  border-radius:22px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}

button{
  width:100%;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#ff4fa3;
  font-weight:bold;
  cursor:pointer;
  margin-top:20px;
  outline:none;
}

/* COUNTDOWN */
.count{
  font-size:60px;
  font-weight:900;
  margin-top:20px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

/* BALLOON */
.stage{
  margin-top:20px;
  display:flex;
  justify-content:center
}

.balloon{
  width:170px;
  height:210px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:55px;
  font-weight:900;
  color:white;
  box-shadow: inset -18px -22px rgba(0,0,0,.18);
  animation:float 2s ease-in-out infinite;
  cursor:pointer;
  position:relative;
  transition:.15s;
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
  touch-action: manipulation;
  outline:none;
}

.balloon:active{
  transform:scale(.9);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
}

.string{
  width:2px;
  height:90px;
  background:white;
  position:absolute;
  bottom:-90px;
  left:50%;
  transform:translateX(-50%);
}

/* BURST */
.burst{
  position:absolute;
  width:10px;
  height:14px;
  border-radius:50%;
  animation:explode 600ms ease-out forwards;
}

@keyframes explode{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--x),var(--y)) scale(.4);opacity:0}
}

/* CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:12px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg)}
}

/* CARD */
.birthday-card{
  padding:25px;
  border-radius:18px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  animation:fadeIn .8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.glow{
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px white}
  to{text-shadow:0 0 25px #fff,0 0 40px #ffb3f0}
}

/* POLAROID */
.polaroid{
  background:white;
  padding:10px 10px 30px;
  border-radius:12px;
  box-shadow:0 15px 30px rgba(0,0,0,.3);
  color:#333;
  width:85%;
  max-width:300px;
  margin:20px auto;
  position:relative;
}

.polaroid img{
  width:100%;
  border-radius:8px;
}

.tape{
  width:60px;
  height:18px;
  background:rgba(255,255,255,.7);
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%) rotate(-5deg);
  border-radius:4px;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<audio id="bgMusic" loop>
  <source src="Backsound.mp3" type="audio/mpeg">
</audio>

<audio id="popSound">
  <source src="ballons.mp3" type="audio/mpeg">
</audio>

<script>
let config={};

fetch("data.json")
.then(res=>res.json())
.then(data=>{
  config=data;
  showStartButton();
});

function showStartButton(){
  app.innerHTML=`
    <h2>Siap yaa... 💖</h2>
    <button onclick="startCountdown()">Buka Hadiah 🎁</button>
  `;
}

function startCountdown(){
  const music=document.getElementById("bgMusic");
  music.volume=0.6;
  music.play();

  let count=5;
  app.innerHTML=`
    <h2>Hadiah nya lagi di siapin 💖</h2>
    <div class="count" id="count">${count}</div>
  `;

  const interval=setInterval(()=>{
    count--;
    document.getElementById("count").textContent=count;
    if(count<=0){
      clearInterval(interval);
      startGame();
    }
  },1000);
}

let current=1;
const rainbow=["#ff4d4d","#ff8a3d","#ffd23f","#4cd964","#5ac8fa","#5856d6","#ff2d55"];

function startGame(){
  renderBalloon();
}

function renderBalloon(){
  const color=rainbow[(current-1)%rainbow.length];
  app.innerHTML=`
    <h2>Balon ${current}/${config.totalBalloons}</h2>
    <p style="margin-top:10px;font-size:16px;opacity:.9">
      Klik balonnya untuk dipecahkan yaa 🎈✨
    </p>
    <div class="stage">
      <div class="balloon" style="background:${color}" onclick="popBalloon(this)">
        ${current}
        <div class="string"></div>
      </div>
    </div>
  `;
}

function popBalloon(el){

  const pop=document.getElementById("popSound");
  pop.currentTime=0;
  pop.play().catch(()=>{});

  if(navigator.vibrate){
    navigator.vibrate(80);
  }

  const rect=el.getBoundingClientRect();

  for(let i=0;i<20;i++){
    const piece=document.createElement("div");
    piece.className="burst";
    piece.style.left=rect.left+rect.width/2+"px";
    piece.style.top=rect.top+rect.height/2+"px";
    piece.style.background=el.style.background;
    piece.style.setProperty('--x',(Math.random()-0.5)*300+"px");
    piece.style.setProperty('--y',(Math.random()-0.5)*300+"px");
    document.body.appendChild(piece);
    setTimeout(()=>piece.remove(),600);
  }

  el.style.transform="scale(1.4)";
  setTimeout(()=>{
    el.style.transform="scale(0)";
    el.style.opacity="0";
  },80);

  setTimeout(()=>{
    current++;
    if(current>config.totalBalloons){
      showBirthdayCard();
    }else{
      renderBalloon();
    }
  },300);
}

function showBirthdayCard(){
  app.innerHTML=`
    <div class="birthday-card">
      <h2>🎉 Hari ini ulang tahun kamu yang ke 
      <span class="glow">${config.totalBalloons}</span> 🎂</h2>
      <p style="margin-top:15px;font-size:18px;">
        <b>${config.date}</b>
      </p>
      <button onclick="showMessage()">Buka Ucapan 💌</button>
    </div>
  `;

  for(let i=0;i<60;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=rainbow[Math.floor(Math.random()*rainbow.length)];
    c.style.animationDuration=2+Math.random()*2+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

function showMessage(){
  const lines=config.message.split("\n");

  app.innerHTML=`
    <h2>Happy Birthday ${config.name} 🎉</h2>
    <div class="polaroid">
      <div class="tape"></div>
      <img src="picture1.jpeg">
    </div>
    <div id="msg"></div>
    <button onclick="openWA()">Chat Aku 💬</button>
  `;

  const box=document.getElementById("msg");

  lines.forEach(t=>{
    const div=document.createElement("div");
    div.textContent=t;
    div.style.marginTop="10px";
    box.appendChild(div);
  });
}

function openWA(){
  const url=`https://wa.me/${config.waNumber}?text=${encodeURIComponent(config.waText)}`;
  window.open(url,"_blank");
}
</script>

</body>
</html>
